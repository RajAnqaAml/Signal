services: []

# ── Render Cron disabled 2026-05-24 ──────────────────────────────────────────
# We had THREE independent schedulers firing recorder.py --once against the
# same Supabase (this Render cron + cron-job.org + GH Actions native cron).
# That caused 0.3-min duplicate snapshots and wasted ~85 INR/month.
#
# New architecture:
#   - cron-job.org -> repository_dispatch  (PRIMARY, precise timing)
#   - .github/workflows/recorder.yml schedule */30  (BACKUP only)
#
# If you want to re-enable Render Cron, uncomment the block below AND
# pause/delete the existing cron in the Render dashboard so Blueprint sync
# doesn't conflict.
#
# services:
#   - type: cron
#     name: signal-recorder
#     runtime: python
#     plan: starter
#     schedule: "*/10 3-10 * * 1-5"   # NOTE: was 3-9; bump to 3-10 to cover 15:35 IST close
#     buildCommand: pip install -r requirements.txt
#     startCommand: python recorder.py --once
#     envVars:
#       - key: SUPABASE_URL
#         sync: false
#       - key: SUPABASE_SERVICE_KEY
#         sync: false
