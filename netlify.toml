# Netlify hosts the static dashboard.
# Build step generates frontend/config.js from environment variables so the
# anon key + project URL are baked into the deploy without ever committing them.

[build]
  # base = "frontend" hides the repo-root requirements.txt from Netlify's
  # auto-detection, so it does NOT try to pip install the backend deps
  # (which are only needed by the Render recorder, not the static dashboard).
  base = "frontend"
  publish = "."
  command = """
    printf 'window.SUPABASE_CONFIG = { url: \"%s\", anonKey: \"%s\" };' \
      \"$PUBLIC_SUPABASE_URL\" \"$PUBLIC_SUPABASE_ANON_KEY\" > config.js
  """

# Note: set PUBLIC_SUPABASE_URL and PUBLIC_SUPABASE_ANON_KEY in
# Netlify Site Settings -> Build & Deploy -> Environment Variables.
# The anon key is safe to embed (Row Level Security restricts it to SELECT).

[build.environment]
  NODE_VERSION = "18"

# Serverless functions live under frontend/netlify/functions (base = "frontend").
# The chat assistant function needs these env vars set in Netlify Site Settings:
#   GOOGLE_API_KEY  (Gemini)   — required
#   CHAT_TOKEN      (optional)  — if set, the chat page must send a matching PIN
# It reuses PUBLIC_SUPABASE_URL / PUBLIC_SUPABASE_ANON_KEY (already set for build).
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Cache HTML for short window so updates propagate fast
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Static assets can be cached longer
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=300"
