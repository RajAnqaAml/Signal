<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FDF2F8">
    <title>Ask · Signals</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                colors: {
                    blush: { 50:'#FFF7FA',100:'#FDF2F8',200:'#FCE7F3',300:'#FBCFE8',400:'#F9A8D4',500:'#EC4899',600:'#DB2777',700:'#BE185D' },
                    ink:'#1F2937', muted:'#6B7280',
                },
                animation: { 'fade-in': 'fadeIn 0.3s ease-out' },
                keyframes: { fadeIn: { '0%': { opacity:0, transform:'translateY(4px)' }, '100%': { opacity:1, transform:'translateY(0)' } } },
            } },
        };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            background:
                radial-gradient(1200px 600px at 100% -20%, #FCE7F3 0%, transparent 60%),
                radial-gradient(900px 500px at -10% 110%, #FBCFE8 0%, transparent 55%),
                #FDF2F8;
            min-height: 100dvh; color: #1F2937;
            -webkit-tap-highlight-color: transparent;
        }
        .card { background:#fff; border-radius:1.25rem; box-shadow:0 1px 2px rgba(236,72,153,.04),0 8px 24px -8px rgba(236,72,153,.10); border:1px solid #FCE7F3; }
        .bubble-user { background:#EC4899; color:#fff; border-radius:1rem 1rem .25rem 1rem; }
        .bubble-bot  { background:#fff; color:#1F2937; border:1px solid #FCE7F3; border-radius:1rem 1rem 1rem .25rem; }
        .bubble-bot p { margin: 0 0 .5rem 0; }
        .bubble-bot p:last-child { margin-bottom: 0; }
        .bubble-bot strong { color:#BE185D; }
        .stat-mono { font-variant-numeric: tabular-nums; }
        .typing span { width:6px;height:6px;background:#F9A8D4;border-radius:9999px;display:inline-block;animation:blink 1.2s infinite both; }
        .typing span:nth-child(2){animation-delay:.2s} .typing span:nth-child(3){animation-delay:.4s}
        @keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
        .chip { background:#FCE7F3; color:#BE185D; border-radius:9999px; padding:.4rem .8rem; font-size:.75rem; font-weight:600; white-space:nowrap; }
        .chip:hover { background:#FBCFE8; }
    </style>
</head>

<body class="font-sans antialiased">
<div class="mx-auto max-w-md md:max-w-2xl px-4 pb-4 pt-3 sm:pt-5 flex flex-col" style="min-height:100dvh">

    <!-- Header -->
    <header class="mb-3 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
            <div class="w-9 h-9 rounded-2xl bg-blush-200 flex items-center justify-center"><span class="text-base">🤖</span></div>
            <div>
                <h1 class="text-lg font-bold tracking-tight">Ask Signals</h1>
                <p class="text-[10px] text-muted uppercase tracking-widest">Trend · Entry · Exit · SL</p>
            </div>
        </div>
        <div id="clock" class="text-[11px] text-muted stat-mono">--:-- IST</div>
    </header>

    <!-- Nav -->
    <nav class="mb-3 flex items-center gap-4 text-sm border-b border-blush-200 pb-2.5">
        <a href="index.html" class="text-muted hover:text-blush-600">💗 Now</a>
        <a href="day.html" class="text-muted hover:text-blush-600">📅 Today</a>
        <a href="history.html" class="text-muted hover:text-blush-600">📜 History</a>
        <a href="chat.html" class="text-blush-700 font-semibold">🤖 Ask</a>
    </nav>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto space-y-3 mb-3"></div>

    <!-- Quick chips -->
    <div id="chips" class="flex gap-2 overflow-x-auto pb-2 mb-1">
        <button class="chip" data-q="What's the trend in Bank Nifty?">Trend · BankNifty</button>
        <button class="chip" data-q="Entry, exit and SL for Nifty?">Entry/Exit · Nifty</button>
        <button class="chip" data-q="What's the status today across all three?">Status today</button>
        <button class="chip" data-q="Any TIER_1 / GREEN signals today?">Any GREEN today?</button>
    </div>

    <!-- Input -->
    <form id="chat-form" class="card flex items-end gap-2 p-2">
        <textarea id="input" rows="1" placeholder="Ask about trend, entry, exit, SL…"
            class="flex-1 resize-none bg-transparent px-2 py-1.5 text-sm focus:outline-none max-h-32"></textarea>
        <button type="submit" id="send"
            class="shrink-0 w-9 h-9 rounded-xl bg-blush-500 text-white flex items-center justify-center disabled:opacity-40">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M13 6l6 6-6 6"/></svg>
        </button>
    </form>
    <p class="text-[10px] text-muted/70 text-center mt-2">Estimates only · Rs figures approx · Not financial advice</p>

</div>

<script src="chat.js"></script>
</body>
</html>
