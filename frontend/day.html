<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#FDF2F8">
    <title>Day View</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {
                fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                colors: {
                    blush: { 50: '#FFF7FA', 100: '#FDF2F8', 200: '#FCE7F3', 300: '#FBCFE8', 400: '#F9A8D4', 500: '#EC4899', 600: '#DB2777', 700: '#BE185D' },
                    ink: '#1F2937', muted: '#6B7280', emerald: '#10B981', amber: '#F59E0B', rose: '#EF4444',
                },
                animation: { 'fade-in': 'fadeIn 0.4s ease-out', 'shimmer': 'shimmer 1.6s linear infinite' },
                keyframes: {
                    fadeIn: { '0%': { opacity: 0, transform: 'translateY(6px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
                    shimmer: { '0%': { backgroundPosition: '-400px 0' }, '100%': { backgroundPosition: '400px 0' } },
                },
            } },
        };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="common.js"></script>

    <style>
        body {
            background:
                radial-gradient(1200px 600px at 100% -20%, #FCE7F3 0%, transparent 60%),
                radial-gradient(900px 500px at -10% 110%, #FBCFE8 0%, transparent 55%),
                #FDF2F8;
            min-height: 100dvh;
            color: #1F2937;
        }
        .card {
            background: white; border-radius: 1.25rem;
            box-shadow: 0 1px 2px rgba(236,72,153,.04), 0 8px 24px -8px rgba(236,72,153,.10);
            border: 1px solid #FCE7F3;
        }
        .pill {
            display: inline-flex; align-items: center; gap: .35rem;
            padding: .15rem .55rem; border-radius: 9999px;
            font-size: .65rem; font-weight: 600; letter-spacing: .04em;
            text-transform: uppercase;
        }
        .pill-green { background: #ECFDF5; color: #047857; }
        .pill-amber { background: #FEF3C7; color: #92400E; }
        .pill-rose  { background: #FEE2E2; color: #B91C1C; }
        .pill-pink  { background: #FCE7F3; color: #BE185D; }
        .pill-grey  { background: #F3F4F6; color: #4B5563; }
        .stat-mono { font-variant-numeric: tabular-nums; }
        .skeleton {
            background: linear-gradient(90deg, #FCE7F3 0%, #FBCFE8 50%, #FCE7F3 100%);
            background-size: 800px 100%;
            animation: shimmer 1.6s linear infinite;
            border-radius: .5rem;
        }
        @keyframes livepulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
        .live-dot { animation: livepulse 1.8s ease-in-out infinite; }

        /* Snapshot row left-edge tier indicator */
        .snap-row { border-left: 3px solid transparent; }
        .snap-row.tier-green  { border-left-color: #10B981; background: #ECFDF522; }
        .snap-row.tier-amber  { border-left-color: #F59E0B; background: #FEF3C722; }
        .snap-row.tier-rose   { border-left-color: #EF4444; background: #FEE2E222; }

        /* Notification rows: subtle pink outer ring so they pop in All-snaps view */
        .snap-row.is-notif {
            box-shadow: 0 0 0 2px #FBCFE8, 0 1px 2px rgba(236,72,153,.04), 0 8px 24px -8px rgba(236,72,153,.10);
        }
    </style>
</head>

<body class="font-sans antialiased">

<div class="mx-auto max-w-md md:max-w-2xl px-4 pb-10 pt-3 sm:pt-5">

    <!-- Header -->
    <header class="mb-3 flex items-center justify-between">
        <div class="flex items-center gap-2.5">
            <div class="w-9 h-9 rounded-2xl bg-blush-200 flex items-center justify-center">
                <span class="text-blush-600 text-base">💗</span>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight">Signals</h1>
                <p class="text-[10px] text-muted uppercase tracking-widest">NIFTY + BANK NIFTY</p>
            </div>
        </div>
        <div class="text-right">
            <div id="market-status" class="pill pill-pink">
                <span class="w-1.5 h-1.5 rounded-full bg-blush-500"></span>
                <span id="market-status-text">…</span>
            </div>
            <div id="clock" class="text-[11px] text-muted mt-1 stat-mono">--:-- IST</div>
        </div>
    </header>

    <!-- Nav -->
    <nav class="mb-4 flex items-center gap-4 text-sm border-b border-blush-200 pb-2.5">
        <a href="index.html" data-nav="now"     class="text-muted hover:text-blush-600">💗 Now</a>
        <a href="day.html"   data-nav="today"   class="text-muted hover:text-blush-600">📅 Today</a>
        <a href="history.html" data-nav="history" class="text-muted hover:text-blush-600">📜 History</a>
        <a href="chat.html"  data-nav="chat"    class="text-muted hover:text-blush-600">🤖 Ask</a>
    </nav>

    <!-- Day header -->
    <section class="mb-3">
        <div class="flex items-center justify-between">
            <h2 id="day-title" class="text-xl font-extrabold tracking-tight">Today</h2>
            <span id="day-date" class="text-xs text-muted stat-mono">—</span>
        </div>
        <p id="day-sub" class="text-xs text-muted mt-0.5">Loading…</p>
    </section>

    <!-- Symbol toggle -->
    <div class="mb-3 flex gap-2">
        <button data-symbol="NIFTY"     id="sym-NIFTY"     class="symbol-btn flex-1 rounded-xl px-3 py-2 text-xs font-semibold border transition">NIFTY</button>
        <button data-symbol="BANKNIFTY" id="sym-BANKNIFTY" class="symbol-btn flex-1 rounded-xl px-3 py-2 text-xs font-semibold border transition">BANK NIFTY</button>
        <button data-symbol="SENSEX"    id="sym-SENSEX"    class="symbol-btn flex-1 rounded-xl px-3 py-2 text-xs font-semibold border transition">SENSEX</button>
    </div>
    <style>
        .symbol-btn { background: white; color: #6B7280; border-color: #FCE7F3; }
        .symbol-btn.active { background: #FCE7F3; color: #BE185D; border-color: #FBCFE8; }
    </style>

    <!-- Day summary card -->
    <section class="card px-5 py-4 mb-3 animate-fade-in">
        <div class="grid grid-cols-3 gap-2 mb-3">
            <div class="rounded-xl bg-blush-100 px-3 py-2">
                <p class="text-[10px] text-muted uppercase tracking-wider">Open</p>
                <p id="sum-open" class="text-sm font-bold stat-mono">—</p>
            </div>
            <div class="rounded-xl bg-blush-100 px-3 py-2">
                <p class="text-[10px] text-muted uppercase tracking-wider">Close</p>
                <p id="sum-close" class="text-sm font-bold stat-mono">—</p>
            </div>
            <div class="rounded-xl bg-blush-100 px-3 py-2">
                <p class="text-[10px] text-muted uppercase tracking-wider">Move</p>
                <p id="sum-move" class="text-sm font-bold stat-mono">—</p>
            </div>
        </div>
        <div class="grid grid-cols-3 gap-2">
            <div class="rounded-xl bg-blush-100 px-3 py-2">
                <p class="text-[10px] text-muted uppercase tracking-wider">Snaps</p>
                <p id="sum-snaps" class="text-sm font-bold stat-mono">—</p>
            </div>
            <div class="rounded-xl bg-blush-100 px-3 py-2">
                <p class="text-[10px] text-muted uppercase tracking-wider">Signals</p>
                <p id="sum-signals" class="text-sm font-bold stat-mono">—</p>
            </div>
            <div class="rounded-xl bg-blush-100 px-3 py-2">
                <p class="text-[10px] text-muted uppercase tracking-wider">Net P&amp;L</p>
                <p id="sum-pnl" class="text-sm font-bold stat-mono">—</p>
            </div>
        </div>
    </section>

    <!-- Timeline title + view toggle -->
    <div class="flex items-center justify-between mb-2 px-1">
        <h3 class="text-xs font-semibold text-muted uppercase tracking-widest">
            <span id="timeline-title">Notifications</span>
        </h3>
        <div class="flex items-center gap-2 text-[10px]">
            <button id="view-notifs" class="view-btn px-2 py-0.5 rounded-md font-semibold transition">Notifs</button>
            <button id="view-all" class="view-btn px-2 py-0.5 rounded-md font-semibold transition">All snaps</button>
        </div>
    </div>
    <style>
        .view-btn { background: transparent; color: #6B7280; border: 1px solid transparent; }
        .view-btn.active { background: #FCE7F3; color: #BE185D; border-color: #FBCFE8; }
    </style>

    <!-- Timeline list (skeleton initially) -->
    <section id="timeline" class="space-y-2">
        <div class="card px-4 py-3"><div class="skeleton h-3 w-3/4 mb-1.5"></div><div class="skeleton h-2 w-1/2"></div></div>
        <div class="card px-4 py-3"><div class="skeleton h-3 w-2/3 mb-1.5"></div><div class="skeleton h-2 w-1/3"></div></div>
        <div class="card px-4 py-3"><div class="skeleton h-3 w-3/5 mb-1.5"></div><div class="skeleton h-2 w-2/5"></div></div>
    </section>

    <!-- Footer -->
    <footer class="mt-6 text-center">
        <p class="text-[10px] text-muted">
            <a href="history.html" class="text-blush-600 hover:underline">← Back to history</a>
        </p>
    </footer>

</div>

<script src="day.js"></script>
</body>
</html>
