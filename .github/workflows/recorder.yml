name: NSE Signal Recorder

# Captures one snapshot per fire during NSE market hours
# (Mon-Fri 09:15-15:35 IST = 03:45-10:05 UTC).
#
# *** PRIMARY trigger: cron-job.org -> repository_dispatch ***
# Configure at https://cron-job.org with these settings:
#   - URL: POST https://api.github.com/repos/<owner>/<repo>/dispatches
#   - Body: {"event_type": "run-recorder"}
#   - Header: Authorization: Bearer <fine-grained PAT with Actions:write>
#   - Schedule: every 2 min from 03:45 UTC (09:15 IST) to 10:05 UTC (15:35 IST), Mon-Fri
#   - First fire MUST be 03:45 UTC sharp to capture the market open
#
# *** FALLBACK trigger: GH-native cron (every 10 min) ***
# GitHub free-tier native cron can lag 30+ min during peak hours, so we only
# use it as a sparse backup. Cron-job.org is the source of truth for timing.

on:
  repository_dispatch:
    types: [run-recorder]

  schedule:
    # Every 10 min from 03:45-10:00 UTC (09:15-15:30 IST). Backup only.
    - cron: '0,10,20,30,40,50 3-10 * * 1-5'
    # Daily candle backfill at 10:30 UTC (16:00 IST) — 30 min after market close.
    - cron: '30 10 * * 1-5'

  # Manual trigger from the Actions tab for testing.
  workflow_dispatch:
    inputs:
      force:
        description: 'Force snapshot outside market hours (for testing)'
        required: false
        default: 'false'

# Cancel an already-running instance if a new one is triggered.
# Snapshots are idempotent in DB (UNIQUE on ts,symbol) so overlap is harmless,
# but cancellation keeps the action minutes count down.
concurrency:
  group: recorder
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set date (IST)
        run: echo "IST_DATE=$(TZ=Asia/Kolkata date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Restore news cache
        uses: actions/cache@v4
        with:
          path: news_cache.json
          key: news-cache-${{ env.IST_DATE }}

      - name: Take snapshot
        if: github.event.schedule != '30 10 * * 1-5'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: |
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "Force-mode: bypassing market-hours gate"
            python recorder.py --once --force
          else
            python recorder.py --once
          fi

      - name: Daily candle backfill (16:00 IST)
        if: github.event.schedule == '30 10 * * 1-5'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          PYTHONIOENCODING: utf-8
        run: python fetch_all_history.py --days 5
